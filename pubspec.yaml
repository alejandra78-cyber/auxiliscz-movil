name: auxilio_scz
description: Aplicación móvil AuxilioSCZ - Asistencia vehicular

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.5
  http: ^1.1.0
  geolocator: ^10.1.0
  image_picker: ^1.0.4
  record: ^5.0.4
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  firebase_core: ^2.17.0
  firebase_messaging: ^14.6.9
  web_socket_channel: ^2.4.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true