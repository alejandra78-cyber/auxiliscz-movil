name: auxilio_scz
description: Aplicación móvil AuxilioSCZ - Asistencia vehicular

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.5
  http: ^1.1.0
  geolocator: ^14.0.2
  image_picker: ^1.0.4
  record: ^6.2.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  web_socket_channel: ^3.0.3
  flutter_map: ^8.2.2
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true